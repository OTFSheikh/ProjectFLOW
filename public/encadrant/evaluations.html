<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectFLOW - Évaluations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="common.css" />
    <style>
        .eval-layout { display: flex; gap: 1.25rem; }
        .eval-sidebar { width: 220px; flex-shrink: 0; }
        .eval-main { flex: 1; }
        .filter-btn { text-align: left; width: 100%; }
        .filter-btn.active { background: var(--gray-900); color: #fff; }
        .eval-group-card { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.5rem; cursor: pointer; transition: border-color var(--transition); }
        .eval-group-card:hover { border-color: var(--gray-300); }
        .eval-group-card .score-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; }
        .eval-group-card .score-circle.has-score { background: #dcfce7; color: #16a34a; }
        .eval-group-card .score-circle.no-score { background: var(--gray-100); color: var(--gray-400); }
        @media (max-width: 900px) { .eval-layout { flex-direction: column; } .eval-sidebar { width: 100%; } }
    </style>
</head>
<body>
    <nav id="sidebar"></nav>
    <div class="main-content">
        <header class="topbar">
            <div>
                <div class="breadcrumb">Accueil &rsaquo; Évaluations</div>
                <h1>Évaluations</h1>
            </div>
        </header>
        <main class="page-content">
            <div class="eval-layout">
                <!-- Filtre par projet -->
                <aside class="eval-sidebar">
                    <div class="card">
                        <h3 style="font-size:0.95rem;margin-bottom:1rem;"><i class="fas fa-folder" style="margin-right:0.5rem;"></i>Projets</h3>
                        <div id="projectFilters" style="display:flex;flex-direction:column;gap:0.4rem;"></div>
                    </div>
                </aside>
                <!-- Contenu principal -->
                <div class="eval-main">
                    <div id="evalContent">
                        <p style="color:var(--gray-500);text-align:center;padding:2rem;">Sélectionnez un projet pour voir les évaluations des groupes.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="sidebar.js"></script>
    <script>
        renderSidebar("evaluations");

        let projects = [];
        let projectGroups = {};
        let selectedProject = null;

        async function load() {
            await checkEncadrantAuth();

            const pRes = await fetch("/api/encadrant/projects", { credentials: "include" });
            const pData = await pRes.json();
            if (!pData.success) return;
            projects = pData.projects;

            for (const p of projects) {
                const gRes = await fetch(`/api/encadrant/projects/${p.id_projet}`, { credentials: "include" });
                const gData = await gRes.json();
                if (gData.success) {
                    projectGroups[p.id_projet] = gData.groups;
                }
            }

            renderProjectFilters();

            if (projects.length > 0) {
                selectProject(projects[0].id_projet);
            }
        }

        function renderProjectFilters() {
            const container = document.getElementById("projectFilters");
            container.innerHTML = projects.map(p => `
                <button class="btn btn-sm filter-btn ${selectedProject === p.id_projet ? 'active' : 'btn-secondary'}" onclick="selectProject(${p.id_projet})">${esc(p.nom)}</button>
            `).join("");
        }

        async function selectProject(projectId) {
            selectedProject = projectId;
            renderProjectFilters();
            await renderGroupsEval();
        }

        async function renderGroupsEval() {
            const content = document.getElementById("evalContent");
            const groups = projectGroups[selectedProject] || [];
            const project = projects.find(p => p.id_projet === selectedProject);

            if (groups.length === 0) {
                content.innerHTML = '<p style="color:var(--gray-500);text-align:center;padding:2rem;">Aucun groupe dans ce projet.</p>';
                return;
            }

            // Charger les évaluations de chaque groupe
            const evalData = [];
            for (const g of groups) {
                const res = await fetch(`/api/encadrant/groups/${g.id_groupe}/evaluation`, { credentials: "include" });
                const data = await res.json();
                evalData.push({
                    group: g,
                    evaluation: data.success ? data.evaluation : null,
                    notes: data.success ? data.notes : []
                });
            }

            content.innerHTML = `
                <div style="margin-bottom:1.5rem;">
                    <h3 style="font-size:1rem;margin-bottom:0.25rem;">${esc(project.nom)}</h3>
                    <p style="font-size:0.8rem;color:var(--gray-500);">${groups.length} groupe(s) — Cliquez sur un groupe pour voir le détail</p>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;" id="evalGroupsGrid">
                    ${evalData.map(ed => {
                        const hasEval = ed.evaluation && ed.evaluation.note_finale !== null;
                        return `
                            <div class="eval-group-card" onclick="showGroupDetail(${ed.group.id_groupe})">
                                <div style="display:flex;align-items:center;gap:1rem;">
                                    <div class="score-circle ${hasEval ? 'has-score' : 'no-score'}">
                                        ${hasEval ? ed.evaluation.note_finale + '' : '—'}
                                    </div>
                                    <div>
                                        <h4 style="font-size:0.95rem;margin-bottom:0.25rem;">${esc(ed.group.nom)}</h4>
                                        <p style="font-size:0.75rem;color:var(--gray-500);">${ed.group.sujet_titre ? esc(ed.group.sujet_titre) : 'Pas de sujet'}</p>
                                        <p style="font-size:0.7rem;color:var(--gray-400);margin-top:0.25rem;">
                                            ${hasEval ? `Évalué le ${new Date(ed.evaluation.date_evaluation).toLocaleDateString('fr-FR')}` : 'Non évalué'}
                                        </p>
                                    </div>
                                </div>
                                ${hasEval && ed.notes.length > 0 ? `
                                    <div style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.4rem;">
                                        ${ed.notes.map(n => `
                                            <span style="font-size:0.7rem;background:var(--gray-50);padding:0.2rem 0.5rem;border-radius:4px;">${esc(n.critere_nom)}: ${n.note}/${n.ponderation}</span>
                                        `).join("")}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join("")}
                </div>
            `;
        }

        function showGroupDetail(groupId) {
            window.location.href = `/encadrant/group.html?id=${groupId}&tab=evaluation`;
        }

        function esc(str) { const d = document.createElement("div"); d.textContent = str || ""; return d.innerHTML; }
        function showToast(msg, type = "success") {
            const t = document.getElementById("toast");
            t.textContent = msg; t.className = `toast show ${type}`;
            setTimeout(() => t.className = "toast", 3000);
        }

        load();
    </script>
</body>
</html>
