<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectFlow - Mot de passe oublié</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF8904;
            --primary-light: #FFB86A;
            --primary-glow: rgba(255, 137, 4, 0.3);
            --gray-900: #111827;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-400: #9ca3af;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
            --gray-50: #f9fafb;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }
        /* Image de fond avec overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://images.pexels.com/photos/7640435/pexels-photo-7640435.jpeg') center/cover no-repeat;
            z-index: -2;
            animation: kenBurns 20s ease-in-out infinite alternate;
        }
        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.75) 0%, rgba(17, 24, 39, 0.55) 50%, rgba(255, 137, 4, 0.25) 100%);
            z-index: -1;
        }
        /* Particules flottantes */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 8s ease-in-out infinite;
        }
        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 10s; }
        .particle:nth-child(2) { left: 25%; top: 60%; animation-delay: 2s; animation-duration: 12s; width: 6px; height: 6px; }
        .particle:nth-child(3) { left: 40%; top: 30%; animation-delay: 4s; animation-duration: 9s; }
        .particle:nth-child(4) { left: 55%; top: 70%; animation-delay: 1s; animation-duration: 11s; width: 5px; height: 5px; }
        .particle:nth-child(5) { left: 70%; top: 40%; animation-delay: 3s; animation-duration: 13s; }
        .particle:nth-child(6) { left: 85%; top: 25%; animation-delay: 5s; animation-duration: 10s; width: 3px; height: 3px; }
        .particle:nth-child(7) { left: 15%; top: 80%; animation-delay: 2.5s; animation-duration: 14s; width: 5px; height: 5px; }
        .particle:nth-child(8) { left: 90%; top: 55%; animation-delay: 1.5s; animation-duration: 11s; }
        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            15% { opacity: 0.6; }
            50% { opacity: 0.3; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
        }
        /* Card avec glassmorphism */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 20px 60px rgba(255, 137, 4, 0.08);
            padding: 3rem 2.5rem;
            max-width: 460px;
            width: 100%;
            position: relative;
            animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.96);
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* Glow derrière la card */
        .card::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
        }
        .card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -0.02em;
            animation: fadeSlideUp 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .card p.subtitle {
            color: var(--gray-600);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeSlideUp 0.6s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeSlideUp 0.6s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
            font-size: 0.875rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: var(--white);
            color: var(--gray-900);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow), 0 4px 12px rgba(255, 137, 4, 0.1);
            transform: translateY(-1px);
        }
        .form-group input::placeholder { color: var(--gray-400); }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 1rem;
            transition: color 0.3s;
            pointer-events: none;
        }
        .form-group input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            animation: fadeSlideUp 0.6s 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 4px 16px rgba(255, 137, 4, 0.35);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 137, 4, 0.45);
        }
        .btn:hover::before { left: 100%; }
        .btn:active { transform: translateY(0) scale(0.98); }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn:disabled::before { display: none; }
        /* Spinner de chargement */
        .btn .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message {
            padding: 0.85rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.9rem;
            font-weight: 500;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            padding-left: 2.5rem;
        }
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
        }
        .message.error {
            display: block;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: #dc2626;
            border: 1px solid #fecaca;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.08);
        }
        .message.error::before { content: '\f071'; }
        .message.success {
            display: block;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #16a34a;
            border: 1px solid #bbf7d0;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.08);
        }
        .message.success::before { content: '\f00c'; }
        .logo {
            text-align: center;
            margin-bottom: 1.75rem;
            animation: fadeSlideUp 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo-icon {
            display: inline-flex;
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 24px rgba(255, 137, 4, 0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-icon:hover { transform: scale(1.08) rotate(3deg); }
        .logo-icon::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(50%) translateY(50%); }
        }
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.75rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeSlideUp 0.6s 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            padding: 0.5rem;
            border-radius: 8px;
        }
        .back-link:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }
        .back-link i {
            transition: transform 0.3s;
        }
        .back-link:hover i {
            transform: translateX(-3px);
        }
        /* Séparateur décoratif */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            color: var(--gray-400);
            font-size: 0.8rem;
            animation: fadeSlideUp 0.6s 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gray-200), transparent);
        }
        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; border-radius: 20px; }
            .card h1 { font-size: 1.5rem; }
            body::before { animation: none; }
        }
        /* Mode réduit de mouvement */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">PF</div>
        </div>
        <h1>Mot de passe oublié ?</h1>
        <p class="subtitle">Entrez votre email : nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

        <div id="message" class="message"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Adresse email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email" />
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <span class="spinner"></span>
                <span class="btn-text">Envoyer le lien</span>
            </button>
        </form>

        <div class="divider">ou</div>

        <a href="/login.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>

    <script>
        const form = document.getElementById("forgotForm");
        const messageEl = document.getElementById("message");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            messageEl.className = "message";
            messageEl.style.display = "none";

            const email = document.getElementById("email").value.trim();
            if (!email) {
                messageEl.textContent = "Merci de renseigner votre email.";
                messageEl.className = "message error";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add("loading");

            try {
                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.success) {
                    messageEl.textContent = data.message;
                    messageEl.className = "message success";
                    form.style.display = "none";
                } else {
                    messageEl.textContent = data.message || "Une erreur est survenue.";
                    messageEl.className = "message error";
                    submitBtn.disabled = false;
                    submitBtn.classList.remove("loading");
                }
            } catch (err) {
                messageEl.textContent = "Impossible de contacter le serveur.";
                messageEl.className = "message error";
                submitBtn.disabled = false;
                submitBtn.classList.remove("loading");
            }
        });
    </script>
</body>
</html>
