<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectFlow - Mot de passe oublié</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF8904;
            --primary-dark: #FFB86A;
            --gray-900: #111827;
            --gray-600: #4b5563;
            --gray-200: #e5e7eb;
            --gray-50: #f9fafb;
            --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 3rem;
            max-width: 450px;
            width: 100%;
        }
        .card h1 {
            font-size: 1.5rem;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        .card p.subtitle {
            color: var(--gray-600);
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.error { display: block; background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .message.success { display: block; background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo-icon {
            display: inline-flex;
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
            font-size: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">PF</div>
        </div>
        <h1>Mot de passe oublié ?</h1>
        <p class="subtitle">Entrez votre email : nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

        <div id="message" class="message"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email" />
            </div>
            <button type="submit" class="btn" id="submitBtn">Envoyer le lien</button>
        </form>

        <a href="/login.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>

    <script>
        const form = document.getElementById("forgotForm");
        const messageEl = document.getElementById("message");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            messageEl.className = "message";
            messageEl.style.display = "none";

            const email = document.getElementById("email").value.trim();
            if (!email) {
                messageEl.textContent = "Merci de renseigner votre email.";
                messageEl.className = "message error";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Envoi...";

            try {
                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.success) {
                    messageEl.textContent = data.message;
                    messageEl.className = "message success";
                    form.style.display = "none";
                } else {
                    messageEl.textContent = data.message || "Une erreur est survenue.";
                    messageEl.className = "message error";
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Envoyer le lien";
                }
            } catch (err) {
                messageEl.textContent = "Impossible de contacter le serveur.";
                messageEl.className = "message error";
                submitBtn.disabled = false;
                submitBtn.textContent = "Envoyer le lien";
            }
        });
    </script>
</body>
</html>
